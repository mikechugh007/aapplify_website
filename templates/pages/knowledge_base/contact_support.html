{% extends 'mainbase.html' %}
{% block content %}
<section class="py-16 bg-gradient-to-br from-pink-50 to-white">
  <div class="container mx-auto px-4 max-w-xl">
    <h1 class="text-4xl font-extrabold text-pink-900 mb-4">Contact Support</h1>
    <p class="text-lg text-gray-700 mb-6">Need help? Fill out the form below and our support team will get back to you as soon as possible.</p>
    <form method="post" action="{% url 'kb_contact_support' %}" class="bg-white rounded-xl shadow p-6 space-y-4">
      {% csrf_token %}
      <div>
        <label for="customer_name" class="block font-bold mb-1">Customer Name</label>
        <input type="text" id="customer_name" name="customer_name" class="w-full border rounded px-3 py-2" required>
      </div>
      <div>
        <label for="email" class="block font-bold mb-1">Email</label>
        <input type="email" id="email" name="email" class="w-full border rounded px-3 py-2" required>
      </div>
      <div>
        <label for="phone" class="block font-bold mb-1">Phone</label>
        <input type="tel" id="phone" name="phone" class="w-full border rounded px-3 py-2">
      </div>
      <div>
        <label for="reason" class="block font-bold mb-1">Contact Reason</label>
        <textarea id="reason" name="reason" class="w-full border rounded px-3 py-2" rows="4" required></textarea>
      </div>
      <button type="submit" class="bg-pink-800 text-white px-6 py-2 rounded font-bold hover:bg-pink-900 transition">Submit</button>
    </form>
    {% if message %}
      <div class="mt-4 p-4 bg-green-100 text-green-800 rounded">{{ message }}</div>
    {% endif %}
  </div>
</section>
{% endblock %}
