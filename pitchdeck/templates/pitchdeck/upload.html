{% extends 'mainbase.html' %}

{% block meta %}
<title>Staff Discussion Deck Upload | AAPPLIFY</title>
<meta name="robots" content="noindex,nofollow">
{% endblock %}

{% block content %}
<section class="min-h-screen bg-slate-50 px-6 py-24">
    <div class="mx-auto max-w-xl bg-white border border-slate-200 p-8">
        <h1 class="text-3xl font-semibold text-slate-950">Staff discussion deck upload</h1>
        <form method="post" enctype="multipart/form-data" class="mt-8 flex flex-col gap-5">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700" for="{{ form.file.id_for_label }}">Discussion deck</label>
                {{ form.file }}
                <p class="text-sm text-red-600">{{ form.file.errors }}</p>
            </div>
            <button class="bg-slate-950 px-5 py-3 font-semibold text-white" type="submit">Upload</button>
        </form>
    </div>
</section>
{% endblock %}
